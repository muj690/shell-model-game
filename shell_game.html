<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SHELL Model - Drag & Drop</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b2a3b 0%, #1a4a5f 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            touch-action: pan-y;
        }
        .game-container {
            background: #e8f0f5;
            padding: 20px 16px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin: 0 0 2px 0;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 1px;
            color: #0b2a3b;
        }
        .subtitle {
            margin: 0 0 14px 0;
            color: #1f5a72;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .drop-zone {
            background: #d4e2ec;
            border-radius: 40px;
            padding: 18px 12px;
            margin-bottom: 20px;
            border: 4px dashed #2b7a8f;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            transition: background 0.2s;
        }
        .drop-zone.drag-over {
            background: #c0dae8;
            border-color: #f3a712;
        }
        .drop-slot {
            width: 64px;
            height: 64px;
            background: #ffffffcc;
            border-radius: 16px;
            border: 3px solid #2b7a8f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 800;
            color: #0b2a3b;
            transition: 0.15s;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
            touch-action: none;
        }
        .drop-slot.filled {
            background: #f5e6c8;
            border-color: #b68b40;
        }
        .drop-slot.highlight {
            background: #f5e6c8;
            border-color: #f3a712;
            transform: scale(1.05);
        }
        .letters-pool {
            background: #cbdce7;
            border-radius: 32px;
            padding: 16px 12px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            min-height: 76px;
            touch-action: none;
        }
        .letter-tile {
            width: 68px;
            height: 68px;
            background: #fcf3e0;
            border-radius: 16px;
            border: 3px solid #1f5a72;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: #0b2a3b;
            cursor: grab;
            box-shadow: 0 5px 0 #0f3b4b, 0 8px 16px rgba(0,0,0,0.2);
            transition: 0.08s linear;
            touch-action: none;
            /* Prevent text selection */
            -webkit-user-select: none;
            user-select: none;
        }
        .letter-tile:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .letter-tile.dragging {
            opacity: 0.3;
            transform: scale(0.92);
        }
        .letter-tile.placed {
            background: #d4c4a8;
            border-color: #b68b40;
            box-shadow: 0 3px 0 #7a5f30, 0 6px 12px rgba(0,0,0,0.15);
            cursor: default;
            opacity: 0.5;
            pointer-events: none;
        }
        /* Cloned tile for visual feedback during drag */
        .clone-tile {
            position: fixed;
            width: 68px;
            height: 68px;
            background: #fcf3e0;
            border-radius: 16px;
            border: 3px solid #f3a712;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: #0b2a3b;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 9999;
            transform: scale(1.08);
            opacity: 0.92;
            touch-action: none;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #1f5a72;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b2a3b;
            transition: 0.07s linear;
            letter-spacing: 0.5px;
            touch-action: manipulation;
            min-height: 52px;
            min-width: 120px;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0b2a3b;
        }
        button.reset-btn {
            background: #b68b40;
            box-shadow: 0 5px 0 #7a5f30;
        }
        .status-msg {
            margin-top: 16px;
            font-weight: 600;
            font-size: 1.05rem;
            min-height: 2.2rem;
            color: #0b2a3b;
            padding: 0 8px;
        }
        .status-msg.win {
            color: #1d7a3e;
        }
        /* Mobile optimizations */
        @media (max-width: 480px) {
            .game-container { padding: 14px 10px 22px; border-radius: 28px; }
            h1 { font-size: 1.3rem; }
            .drop-slot { width: 54px; height: 54px; font-size: 1.5rem; border-radius: 12px; }
            .letter-tile { width: 58px; height: 58px; font-size: 1.7rem; border-radius: 12px; }
            .clone-tile { width: 58px; height: 58px; font-size: 1.7rem; }
            .drop-zone { padding: 14px 8px; gap: 8px; min-height: 80px; }
            .letters-pool { padding: 12px 8px; gap: 10px; min-height: 64px; }
            button { padding: 12px 18px; font-size: 0.9rem; min-height: 44px; min-width: 90px; }
            .subtitle { font-size: 0.8rem; }
        }
        @media (max-width: 380px) {
            .drop-slot { width: 44px; height: 44px; font-size: 1.2rem; }
            .letter-tile { width: 48px; height: 48px; font-size: 1.4rem; }
            .clone-tile { width: 48px; height: 48px; font-size: 1.4rem; }
            .drop-zone { gap: 5px; padding: 10px 5px; }
            .letters-pool { gap: 6px; padding: 10px 5px; }
        }
    </style>
</head>
<body>

<div class="game-container" id="app">
    <h1>✈️ SHELL Model</h1>
    <div class="subtitle">Drag letters into the correct order: S · H · E · L · L</div>

    <div class="drop-zone" id="dropZone">
        <div class="drop-slot" data-index="0"></div>
        <div class="drop-slot" data-index="1"></div>
        <div class="drop-slot" data-index="2"></div>
        <div class="drop-slot" data-index="3"></div>
        <div class="drop-slot" data-index="4"></div>
    </div>

    <div class="letters-pool" id="lettersPool"></div>

    <div class="btn-group">
        <button class="reset-btn" id="resetBtn">↺ Shuffle</button>
        <button id="checkBtn">✅ Check</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
</div>

<script>
    (function() {
        'use strict';

        const CORRECT = ['S','H','E','L','L'];
        const LETTERS = ['S','H','E','L','L'];

        const dropZone = document.getElementById('dropZone');
        const pool = document.getElementById('lettersPool');
        const statusMsg = document.getElementById('statusMsg');
        const resetBtn = document.getElementById('resetBtn');
        const checkBtn = document.getElementById('checkBtn');

        let slots = ['', '', '', '', ''];
        let tileLetters = [];

        // Touch drag state
        let isDragging = false;
        let dragTile = null;
        let dragLetter = '';
        let dragIndex = -1;          // index in tileLetters
        let dragSourceSlot = -1;     // -1 if from pool, otherwise slot index
        let cloneEl = null;
        let touchOffsetX = 0;
        let touchOffsetY = 0;

        // ---- Render ----
        function render() {
            const slotElements = dropZone.querySelectorAll('.drop-slot');
            slotElements.forEach((el, i) => {
                const letter = slots[i] || '';
                el.textContent = letter;
                el.classList.toggle('filled', letter !== '');
            });

            pool.innerHTML = '';
            tileLetters.forEach((letter, idx) => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.textContent = letter;
                tile.dataset.index = idx;
                tile.dataset.letter = letter;

                // Touch events
                tile.addEventListener('touchstart', onTouchStart, { passive: false });
                tile.addEventListener('touchmove', onTouchMove, { passive: false });
                tile.addEventListener('touchend', onTouchEnd, { passive: false });

                // Mouse drag events (desktop)
                tile.addEventListener('mousedown', onMouseDown);

                pool.appendChild(tile);
            });

            if (!isCorrect()) {
                statusMsg.textContent = '';
                statusMsg.className = 'status-msg';
            } else {
                statusMsg.textContent = '🎉 Perfect! SHELL assembled correctly!';
                statusMsg.className = 'status-msg win';
            }
        }

        // ---- Correct check ----
        function isCorrect() {
            for (let i = 0; i < 5; i++) {
                if (slots[i] !== CORRECT[i]) return false;
            }
            return true;
        }

        // ---- Reset ----
        function resetGame() {
            const allLetters = ['S','H','E','L','L'];
            for (let i = allLetters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allLetters[i], allLetters[j]] = [allLetters[j], allLetters[i]];
            }
            tileLetters = allLetters;
            slots = ['', '', '', '', ''];
            statusMsg.textContent = '';
            statusMsg.className = 'status-msg';
            render();
        }

        // ---- Place letter into slot ----
        function placeLetter(letter, slotIndex) {
            if (slots[slotIndex] !== '') return false;
            slots[slotIndex] = letter;
            return true;
        }

        // ---- Remove letter from slot (return it to pool) ----
        function removeFromSlot(slotIndex) {
            const letter = slots[slotIndex];
            if (!letter) return null;
            slots[slotIndex] = '';
            return letter;
        }

        // ---- Rebuild pool from slots (for consistency) ----
        function rebuildPoolFromSlots() {
            const slotCount = { S:0, H:0, E:0, L:0 };
            for (let i = 0; i < 5; i++) {
                const letter = slots[i];
                if (letter) slotCount[letter] = (slotCount[letter] || 0) + 1;
            }
            const required = { S:1, H:1, E:1, L:2 };
            const poolLetters = [];
            for (const [letter, needed] of Object.entries(required)) {
                const present = slotCount[letter] || 0;
                const add = needed - present;
                for (let i = 0; i < add; i++) {
                    poolLetters.push(letter);
                }
            }
            for (let i = poolLetters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [poolLetters[i], poolLetters[j]] = [poolLetters[j], poolLetters[i]];
            }
            tileLetters = poolLetters;
        }

        // ---- Drop logic (shared for touch & mouse) ----
        function performDrop(letter, slotIndex) {
            // If slot is occupied, swap
            if (slots[slotIndex] !== '') {
                const slotLetter = slots[slotIndex];
                // Put slot letter back into pool
                tileLetters.push(slotLetter);
                // Place dragged letter into slot
                slots[slotIndex] = letter;
                // Remove dragged letter from pool (find and remove one occurrence)
                const idx = tileLetters.indexOf(letter);
                if (idx !== -1) tileLetters.splice(idx, 1);
                // Shuffle pool a bit
                for (let i = tileLetters.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tileLetters[i], tileLetters[j]] = [tileLetters[j], tileLetters[i]];
                }
                render();
                if (isCorrect()) {
                    statusMsg.textContent = '🎉 Perfect! SHELL assembled correctly!';
                    statusMsg.className = 'status-msg win';
                }
                return true;
            }

            // Slot is empty - place letter
            // Remove letter from pool
            const idx = tileLetters.indexOf(letter);
            if (idx !== -1) {
                tileLetters.splice(idx, 1);
                slots[slotIndex] = letter;
                render();
                if (isCorrect()) {
                    statusMsg.textContent = '🎉 Perfect! SHELL assembled correctly!';
                    statusMsg.className = 'status-msg win';
                }
                return true;
            }
            return false;
        }

        // ---- TOUCH HANDLERS ----
        function onTouchStart(e) {
            const tile = e.currentTarget;
            if (tile.classList.contains('placed')) return;
            e.preventDefault();

            const touch = e.touches[0];
            const rect = tile.getBoundingClientRect();
            touchOffsetX = touch.clientX - rect.left;
            touchOffsetY = touch.clientY - rect.top;

            dragTile = tile;
            dragLetter = tile.dataset.letter;
            dragIndex = parseInt(tile.dataset.index, 10);
            dragSourceSlot = -1;
            isDragging = true;

            tile.classList.add('dragging');

            // Create clone
            cloneEl = document.createElement('div');
            cloneEl.className = 'clone-tile';
            cloneEl.textContent = dragLetter;
            cloneEl.style.left = (touch.clientX - touchOffsetX) + 'px';
            cloneEl.style.top = (touch.clientY - touchOffsetY) + 'px';
            document.body.appendChild(cloneEl);

            // Highlight drop slots
            document.querySelectorAll('.drop-slot').forEach(el => el.classList.add('highlight'));
        }

        function onTouchMove(e) {
            if (!isDragging || !cloneEl) return;
            e.preventDefault();

            const touch = e.touches[0];
            cloneEl.style.left = (touch.clientX - touchOffsetX) + 'px';
            cloneEl.style.top = (touch.clientY - touchOffsetY) + 'px';

            // Highlight slot under finger
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.drop-slot').forEach(s => s.classList.remove('drag-over'));
            if (el) {
                const slot = el.closest('.drop-slot');
                if (slot) slot.classList.add('drag-over');
            }
        }

        function onTouchEnd(e) {
            if (!isDragging) return;
            e.preventDefault();

            // Remove clone
            if (cloneEl) {
                cloneEl.remove();
                cloneEl = null;
            }

            // Remove highlights
            document.querySelectorAll('.drop-slot').forEach(el => {
                el.classList.remove('highlight', 'drag-over');
            });

            if (dragTile) {
                dragTile.classList.remove('dragging');
            }

            // Find slot under finger
            const touch = e.changedTouches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            let slotIndex = -1;
            if (el) {
                const slot = el.closest('.drop-slot');
                if (slot) {
                    slotIndex = parseInt(slot.dataset.index, 10);
                }
            }

            if (slotIndex !== -1 && dragLetter) {
                performDrop(dragLetter, slotIndex);
            }

            // Reset drag state
            isDragging = false;
            dragTile = null;
            dragLetter = '';
            dragIndex = -1;
            dragSourceSlot = -1;
        }

        // ---- MOUSE HANDLERS (desktop fallback) ----
        function onMouseDown(e) {
            const tile = e.currentTarget;
            if (tile.classList.contains('placed')) return;

            // We'll use native drag for desktop (simpler)
            // But we need to set dataTransfer
            const letter = tile.dataset.letter;
            const idx = parseInt(tile.dataset.index, 10);

            // For desktop, we use the HTML5 drag API
            tile.draggable = true;
            tile.style.cursor = 'grabbing';

            const dragStartHandler = (ev) => {
                ev.dataTransfer.setData('text/plain', letter);
                ev.dataTransfer.effectAllowed = 'move';
                tile.classList.add('dragging');
                dragIndex = idx;
                dragLetter = letter;
                dragTile = tile;
                isDragging = true;

                // Remove after dragstart
                tile.removeEventListener('dragstart', dragStartHandler);
                // Add dragend handler
                tile.addEventListener('dragend', dragEndHandler);
            };

            const dragEndHandler = (ev) => {
                tile.classList.remove('dragging');
                tile.draggable = false;
                tile.style.cursor = 'grab';
                isDragging = false;
                dragTile = null;
                dragLetter = '';
                dragIndex = -1;
                tile.removeEventListener('dragend', dragEndHandler);
                document.querySelectorAll('.drop-slot').forEach(el => el.classList.remove('drag-over'));
            };

            tile.addEventListener('dragstart', dragStartHandler);

            // Also allow drop on slots (already set up via HTML5)
        }

        // ---- HTML5 Drag & Drop for desktop (slots) ----
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', (e) => {
            dropZone.classList.remove('drag-over');
            document.querySelectorAll('.drop-slot').forEach(el => el.classList.remove('drag-over'));
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            document.querySelectorAll('.drop-slot').forEach(el => el.classList.remove('drag-over'));

            const slotEl = e.target.closest('.drop-slot');
            if (!slotEl) return;
            const slotIndex = parseInt(slotEl.dataset.index, 10);

            const letter = e.dataTransfer.getData('text/plain');
            if (!letter) return;

            // Find if letter exists in pool
            const idx = tileLetters.indexOf(letter);
            if (idx === -1) return;

            // Perform drop
            performDrop(letter, slotIndex);
        });

        // ---- Check button ----
        function checkSolution() {
            if (isCorrect()) {
                statusMsg.textContent = '🎉 Correct! SHELL is properly assembled.';
                statusMsg.className = 'status-msg win';
            } else {
                statusMsg.textContent = '❌ Not quite right. Keep arranging! (S-H-E-L-L)';
                statusMsg.className = 'status-msg';
            }
        }

        // ---- Init ----
        function initGame() {
            const letters = ['S','H','E','L','L'];
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            tileLetters = letters;
            slots = ['', '', '', '', ''];
            render();
            statusMsg.textContent = 'Drag letters into the correct order: S H E L L';
            statusMsg.className = 'status-msg';
        }

        resetBtn.addEventListener('click', resetGame);
        checkBtn.addEventListener('click', checkSolution);

        initGame();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (cloneEl) cloneEl.remove();
        });

    })();
</script>

</body>
</html>
